<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>為台灣禱告 | Pray for Taiwan</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Noto Sans TC', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 90%;
            width: 400px;
            transition: all 0.5s ease;
        }

        h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .status-text {
            font-size: 1.2rem;
            min-height: 2em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
            transition: opacity 0.5s ease;
        }

        .result-box {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease forwards;
        }

        .location-text {
            font-size: 2rem;
            font-weight: 700;
            color: #a8ff78;
            text-shadow: 0 0 10px rgba(168, 255, 120, 0.5);
            margin: 10px 0;
        }

        .redirecting {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>為台灣禱告</h1>
        <div class="subtitle">Pray for Taiwan</div>
        
        <div id="loadingSection">
            <div class="spinner"></div>
            <div class="status-text">抽取今日代禱地區...</div>
        </div>

        <div id="resultSection" class="result-box">
            <div class="status-text" style="margin-bottom: 0;">今日代禱地區</div>
            <div class="location-text" id="locationDisplay">--</div>
            <div class="redirecting">即將前往影片...</div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhqx91y_5EUqOsOnjAXCQ7YjuAXrMBj6mX0_-It4VEicShgdVASf7FYg1H5IChk1aaKtKDmvT2c7OL/pub?gid=1828342091&single=true&output=csv';

        async function init() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = parseCSV(csvText);
                
                // 去除標題列，過濾有 YouTube 網址的列
                const dataRows = rows.slice(1).filter(row => row.length >= 4 && row[3].trim() !== '');
                
                if (dataRows.length > 0) {
                    // 隨機選一個
                    const randomIndex = Math.floor(Math.random() * dataRows.length);
                    const selectedRow = dataRows[randomIndex];
                    
                    const city = selectedRow[1] ? selectedRow[1].trim() : '';
                    const district = selectedRow[2] ? selectedRow[2].trim() : '';
                    const locationName = `${city} ${district}`;
                    
                    const videoUrl = selectedRow[3].trim();
                    
                    // 顯示結果
                    setTimeout(() => {
                        document.getElementById('loadingSection').style.display = 'none';
                        const resultSection = document.getElementById('resultSection');
                        document.getElementById('locationDisplay').innerText = locationName;
                        resultSection.style.display = 'flex';
                        
                        // 1.5 秒後跳轉
                        setTimeout(() => {
                            window.location.replace(videoUrl);
                        }, 1500);
                        
                    }, 800); // 讓使用者至少看 0.8 秒的 loading
                    
                } else {
                    showError("找不到影片資料，請確認試算表內容");
                }
            } catch (err) {
                console.error(err);
                showError("網路連線錯誤，請重試");
            }
        }

        // 簡易 CSV 解析
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const result = [];
                let cur = '', inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuote = !inQuote;
                    else if (char === ',' && !inQuote) { result.push(cur); cur = ''; } 
                    else cur += char;
                }
                result.push(cur); 
                return result;
            });
        }

        function showError(msg) {
            document.getElementById('loadingSection').innerHTML = `<div class="status-text">${msg}</div>`;
        }

        // 開始執行
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
