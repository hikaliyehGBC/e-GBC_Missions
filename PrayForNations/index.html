<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>為萬國禱告 | 懷恩堂差傳組</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 深夜點陣地圖背景 -->
        <div class="night-map-bg"></div>
        <div class="vignette-overlay"></div>

        <header class="main-header">
            <div class="brand">
                <h1 class="title-zh">為萬國禱告</h1>
                <p class="title-en">Pray for the Nations</p>
            </div>
            <!-- 右上角中英切換 -->
            <button id="langToggle" class="top-lang-btn">中 / EN</button>
        </header>

        <main class="viewer-section">
            <div class="card-wrap">
                <div id="prayerCard" class="card">
                    <!-- 左右 10% 隱形觸控區 -->
                    <div class="touch-zone left-zone" id="touchPrev"></div>
                    <div class="touch-zone right-zone" id="touchNext"></div>
                    
                    <div class="card-inner">
                        <img id="cardImg" src="" alt="禱告卡" class="clickable-image">
                    </div>
                </div>
            </div>

            <!-- 集中在下方的控制區 -->
            <div class="bottom-controls">
                <button id="prevBtn" class="square-nav-btn">◀</button>
                <button id="randomBtn" class="pill-btn">🎲 隨機抽取</button>
                <button id="nextBtn" class="square-nav-btn">▶</button>
            </div>
            
            <div class="extra-actions">
                <button id="videoBtn" class="pill-btn video-btn" style="display: none;">▶ 觀看影片</button>
            </div>
        </main>

        <!-- 全螢幕原圖燈箱 -->
        <div id="imageLightbox" class="modal lightbox">
            <div class="lightbox-content">
                <img id="fullImg" src="" alt="原始禱告卡">
            </div>
        </div>

        <!-- YouTube 影片燈箱 -->
        <div id="videoModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="video-wrapper">
                    <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
