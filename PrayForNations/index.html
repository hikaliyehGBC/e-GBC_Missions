<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>為萬國禱告 | 懷恩堂差傳組</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 強制背景圖容器 -->
    <div id="bgLayer" class="custom-world-bg"></div>

    <div id="app" class="app-container">
        <main class="viewer-section">
            <!-- PC 版左右按鈕 (手機版會隱藏) -->
            <button id="pcPrev" class="pc-nav-btn left">◀</button>
            
            <div class="card-wrap intro-hidden" id="mainCardWrap">
                <div id="prayerCard" class="card initial-flip">
                    <div class="card-side card-back">
                        <div class="placeholder-content">
                            <h1 class="card-title-zh">為萬國禱告</h1>
                            <p class="card-title-en">Pray for the Nations</p>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                    
                    <div class="card-side card-front">
                        <div class="touch-zone left-zone" id="touchPrev"></div>
                        <div class="touch-zone right-zone" id="touchNext"></div>
                        <img id="cardImg" src="" alt="禱告卡">
                    </div>
                </div>

                <!-- 緊貼卡片底部的功能區 -->
                <div class="card-footer-controls intro-hidden">
                    <div class="footer-center">
                        <button id="randomBtn" class="pill-btn">🎲 隨機抽取</button>
                    </div>
                    <div class="footer-right">
                        <button id="langToggle" class="small-action-btn">中/EN</button>
                    </div>
                </div>
            </div>

            <button id="pcNext" class="pc-nav-btn right">▶</button>
        </main>

        <div class="extra-actions intro-hidden" style="text-align: center; margin-top: 10px;">
            <button id="videoBtn" class="pill-btn video-btn" style="display: none;">▶ 觀看影片</button>
        </div>

        <audio id="flipSound" src="assets/book-opening-345808.mp3" preload="auto"></audio>

        <!-- 僅保留影片 Modal -->
        <div id="videoModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-modal" id="closeVideo">&times;</span>
                <div class="video-wrapper">
                    <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
