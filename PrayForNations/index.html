<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>為萬國禱告 | 懷恩堂差傳組</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="world-map"></div>

    <div id="app" class="container">
        
        <!-- 使用 Flex 排版的 Main Stage，確保左右按鈕穩固 -->
        <div class="main-stage">
            <button id="pcPrev" class="nav-btn pc-only">◀</button>
            
            <div class="card-wrapper" id="cardWrapper">
                <div class="card" id="prayerCard">
                    <div class="card-inner" id="cardInner">
                        <div class="card-back">
                            <div class="text-group">
                                <h1 class="title-zh">為萬國禱告</h1>
                                <p class="title-en">Pray for the Nations</p>
                            </div>
                        </div>
                        <div class="card-front">
                            <div class="touch-zone left-zone" id="touchPrev"></div>
                            <div class="touch-zone right-zone" id="touchNext"></div>
                            <img id="cardImg" src="" alt="禱告卡">
                        </div>
                    </div>
                </div>
            </div>

            <button id="pcNext" class="nav-btn pc-only">▶</button>
        </div>

        <div class="bottom-controls" id="bottomBtns">
            <div class="footer-center">
                <button id="randomBtn" class="bottom-btn random-btn">🎲 隨機抽取</button>
            </div>
            <div class="footer-right">
                <button id="langToggle" class="bottom-btn lang-btn">中/EN</button>
            </div>
        </div>

        <div id="extraActions" class="extra-actions">
            <button id="videoBtn" class="bottom-btn video-btn" style="display:none;">▶ 觀看影片</button>
        </div>
    </div>

    <audio id="flipSound" src="assets/book-opening-345808.mp3" preload="auto"></audio>
    <div id="videoModal" class="modal" style="display: none;">
        <div class="video-container">
            <span class="close-modal" id="closeVideo">&times;</span>
            <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
