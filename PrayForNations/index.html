<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>為萬國禱告 | 懷恩堂差傳組</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="app-container">
        <!-- 幾何世界地圖背景 -->
        <div class="custom-world-bg"></div>
        <div class="vignette-overlay"></div>

        <header class="main-header intro-hidden">
            <div></div> 
            <button id="langToggle" class="top-lang-btn">中 / EN</button>
        </header>

        <main class="viewer-section">
            <div class="card-wrap intro-hidden" id="mainCardWrap">
                <div id="prayerCard" class="card initial-flip">
                    <!-- 背面：標題面板 -->
                    <div class="card-side card-back">
                        <div class="placeholder-content">
                            <h1 class="card-title-zh">為萬國禱告</h1>
                            <p class="card-title-en">Pray for the Nations</p>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                    
                    <!-- 正面：禱告卡圖片 -->
                    <div class="card-side card-front">
                        <div class="touch-zone left-zone" id="touchPrev"></div>
                        <div class="touch-zone right-zone" id="touchNext"></div>
                        <img id="cardImg" src="" alt="禱告卡" class="clickable-image">
                    </div>
                </div>
            </div>

            <div class="bottom-controls intro-hidden" id="bottomControls">
                <button id="prevBtn" class="square-nav-btn">◀</button>
                <button id="randomBtn" class="pill-btn">🎲 隨機抽取</button>
                <button id="nextBtn" class="square-nav-btn">▶</button>
            </div>
            
            <div class="extra-actions intro-hidden">
                <button id="videoBtn" class="pill-btn video-btn" style="display: none;">▶ 觀看影片</button>
            </div>
        </main>

        <!-- 靜音翻頁音效 -->
        <audio id="flipSound" src="https://assets.mixkit.co/active_storage/sfx/1470/1470-preview.mp3" preload="auto"></audio>

        <!-- 燈箱 -->
        <div id="imageLightbox" class="modal lightbox" style="display: none;">
            <div class="lightbox-content">
                <img id="fullImg" src="" alt="原始禱告卡">
            </div>
        </div>

        <div id="videoModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close-modal" id="closeVideo">&times;</span>
                <div class="video-wrapper">
                    <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
