<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宣教六法自我評估 | 內地會</title>
<meta name="description" content="認識您的宣教恩賜，找到您的服事位置。透過宣教六法評估工具了解自己最適合的宣教方式。">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700&display=swap');

:root {
  --primary: #1E5BA8;
  --primary-dark: #0D3B7A;
  --accent: #FF8C42;
  --accent-light: #FFB380;
  --bg: #F5F5F5;
  --surface: #FFFFFF;
  --text: #333333;
  --text-light: #666666;
  --border: #CCCCCC;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans TC',sans-serif;
  background:linear-gradient(135deg,#1E5BA8 0%,#0D3B7A 100%);
  min-height:100vh; padding:20px; color:var(--text);
}
.container {
  max-width:860px; margin:0 auto; background:var(--surface);
  border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.2); overflow:hidden;
}
.header {
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  padding:40px 30px; text-align:center; color:white; position:relative; overflow:hidden;
}
.header::before {
  content:''; position:absolute; top:-50%; right:-50%;
  width:200%; height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);
  animation:float 20s infinite ease-in-out;
}
@keyframes float {
  0%,100%{transform:translate(0,0) rotate(0deg);}
  50%{transform:translate(-20px,20px) rotate(180deg);}
}
.header h1 {
  font-family:'Noto Serif TC',serif; font-size:2.2rem; font-weight:700;
  margin-bottom:10px; position:relative; z-index:1;
}
.header p { font-size:1rem; opacity:.95; position:relative; z-index:1; }
.content { padding:40px 30px; }
.section { margin-bottom:50px; opacity:0; animation:fadeInUp .6s forwards; }
.section:nth-child(1){animation-delay:.1s;}
.section:nth-child(2){animation-delay:.2s;}
.section:nth-child(3){animation-delay:.3s;}
@keyframes fadeInUp {
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.section-title {
  font-size:1.5rem; font-weight:700; color:var(--primary-dark);
  margin-bottom:20px; padding-bottom:10px; border-bottom:3px solid var(--accent-light);
}
.question-card {
  background:var(--bg); padding:25px; border-radius:16px;
  margin-bottom:20px; border:2px solid var(--border); transition:all .3s ease;
}
.question-card:hover { border-color:var(--primary); box-shadow:0 8px 20px rgba(46,92,138,.1); }
.question-text { font-size:1.05rem; font-weight:500; margin-bottom:15px; line-height:1.6; }
.options { display:flex; flex-direction:column; gap:10px; }
.option {
  display:flex; align-items:center; padding:15px; background:white;
  border:2px solid var(--border); border-radius:12px; cursor:pointer; transition:all .2s ease;
}
.option:hover { border-color:var(--primary); background:#F8FBFF; }
.option input[type="radio"] { width:20px; height:20px; margin-right:12px; cursor:pointer; accent-color:var(--primary); }
.option label { cursor:pointer; flex:1; font-size:.95rem; }
.score-buttons { display:flex; gap:10px; margin-top:15px; flex-wrap:wrap; }
.score-btn {
  width:45px; height:45px; border:2px solid var(--border); background:white;
  color:var(--text); border-radius:8px; cursor:pointer; font-size:1.1rem;
  font-weight:700; transition:all .2s ease; display:flex; align-items:center; justify-content:center;
}
.score-btn:hover { border-color:var(--primary); background:#F0F4F8; }
.score-btn.active {
  background:var(--accent); color:white; border-color:var(--accent);
  box-shadow:0 4px 12px rgba(255,140,66,.3);
}
.calculate-btn {
  width:100%; padding:18px; background:var(--accent); color:white;
  border:none; border-radius:12px; font-size:1.1rem; font-weight:700;
  cursor:pointer; transition:all .3s ease; box-shadow:0 4px 15px rgba(255,140,66,.3);
}
.calculate-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(255,140,66,.4); }
.calculate-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

/* ===== RESULTS ===== */
.results {
  margin-top:40px; padding:30px; background:linear-gradient(135deg,#FFF9F0,#FFFFFF);
  border-radius:16px; border:2px solid var(--accent-light); display:none;
}
.results.show { display:block; animation:fadeInUp .6s; }
.results-title {
  font-family:'Noto Serif TC',serif; color:var(--primary-dark);
  font-size:2rem; margin-bottom:8px; text-align:center; font-weight:700;
}
.results-subtitle { text-align:center; color:var(--text-light); margin-bottom:30px; font-size:.95rem; }

/* Grid layout */
.results-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:30px;
}
@media(max-width:680px){
  .results-grid { grid-template-columns:repeat(2,1fr); gap:14px; }
}

.result-card {
  background:white; border-radius:16px; border:2px solid var(--border);
  overflow:hidden; display:flex; flex-direction:column;
  transition:transform .2s,box-shadow .2s;
}
.result-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,.1); }
.result-card.highlight { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,140,66,.2); }

.card-img {
  width:100%; aspect-ratio:1/1; object-fit:cover; display:block;
}
.card-body { padding:16px; flex:1; display:flex; flex-direction:column; }
.card-title {
  font-size:1.15rem; font-weight:700; color:var(--primary-dark);
  text-align:center; margin-bottom:6px;
}
.card-score {
  font-size:1.6rem; font-weight:900; text-align:center;
  margin-bottom:10px;
}
.card-bar {
  height:8px; background:#eee; border-radius:4px; overflow:hidden; margin-bottom:12px;
}
.card-bar-fill { height:100%; border-radius:4px; transition:width 1s ease; }
.card-desc { font-size:.88rem; color:var(--text-light); line-height:1.5; margin-bottom:10px; }
.card-suggestions { list-style:none; padding:0; margin-bottom:14px; }
.card-suggestions li {
  font-size:.83rem; color:var(--text); padding:4px 0 4px 18px;
  position:relative; line-height:1.5;
}
.card-suggestions li::before {
  content:'›'; position:absolute; left:4px; color:var(--accent); font-weight:700;
}
.card-actions { display:flex; gap:8px; margin-top:auto; }
.card-btn {
  flex:1; padding:9px 6px; color:white; text-decoration:none;
  border-radius:8px; text-align:center; font-weight:600; font-size:.8rem;
  transition:transform .2s; display:block;
}
.card-btn:hover { transform:translateY(-2px); }
.btn-video { background:linear-gradient(135deg,#FF6B6B,#FF8E53); }
.btn-more { background:linear-gradient(135deg,#1E5BA8,#0D3B7A); }

/* Primary highlight */
.primary-highlight {
  background:linear-gradient(135deg,#E3F2FD,#fff); border-radius:16px;
  border:3px solid var(--primary); padding:28px; text-align:center; margin-bottom:24px;
}
.primary-highlight .ph-label { color:var(--text-light); font-size:.9rem; margin-bottom:8px; }
.primary-highlight .ph-name { font-size:1.8rem; font-weight:900; margin-bottom:12px; }
.primary-highlight .ph-desc { font-size:1rem; line-height:1.7; color:var(--text); }

/* Submit toast */
.submit-toast {
  position:fixed; bottom:30px; right:30px; background:#28a745; color:white;
  padding:14px 22px; border-radius:12px; font-weight:600; font-size:.95rem;
  box-shadow:0 4px 20px rgba(0,0,0,.2); opacity:0; transform:translateY(20px);
  transition:all .4s ease; z-index:999; pointer-events:none;
}
.submit-toast.show { opacity:1; transform:translateY(0); }

@media(max-width:600px){
  .header h1 { font-size:1.6rem; }
  .content { padding:25px 20px; }
  .question-card { padding:20px; }
  .results { padding:20px 16px; }
  .results-title { font-size:1.5rem; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🌍 宣教六法自我評估</h1>
    <p>認識您的宣教恩賜 · 找到您的服事位置</p>
  </div>

  <div class="content">
    <!-- 第一部分 -->
    <div class="section">
      <h2 class="section-title">第一部分：快速自我評估</h2>
      <p style="margin-bottom:20px;color:var(--text-light);">請選擇最符合您真實想法與生活現況的選項</p>

      <div class="question-card">
        <div class="question-text"><strong>題目 1：</strong>當你聽到一個未得之民的需要時，你最直覺的反應是什麼？</div>
        <div class="options">
          <div class="option"><input type="radio" id="q1a" name="q1" value="A"><label for="q1a">我想上網查資料、買書，多了解他們的歷史背景與文化</label></div>
          <div class="option"><input type="radio" id="q1b" name="q1" value="B"><label for="q1b">我會立刻將他們的需要記錄在代禱本上，每天為他們提名守望</label></div>
          <div class="option"><input type="radio" id="q1c" name="q1" value="C"><label for="q1c">我想了解有哪些機構在當地服事，在經濟上或用具體的行動支持關懷宣教士與宣教事工</label></div>
          <div class="option"><input type="radio" id="q1d" name="q1" value="D"><label for="q1d">如果我的城市裡有這個族群的人，我想主動去認識、接待並關心他們</label></div>
          <div class="option"><input type="radio" id="q1e" name="q1" value="E"><label for="q1e">我想把這個需要分享給教會的弟兄姊妹，號召大家一起關心</label></div>
          <div class="option"><input type="radio" id="q1f" name="q1" value="F"><label for="q1f">我渴望親自買張機票，實際到當地參與短宣、醫療或教育服務</label></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-text"><strong>題目 2：</strong>在教會參與宣教活動時，你最享受發揮哪一種能力？</div>
        <div class="options">
          <div class="option"><input type="radio" id="q2a" name="q2" value="A"><label for="q2a">收集、整理宣教資訊，或是閱讀宣教士傳記並寫下心得摘要</label></div>
          <div class="option"><input type="radio" id="q2b" name="q2" value="B"><label for="q2b">默默在禱告會中為宣教士的身心靈、事工代求</label></div>
          <div class="option"><input type="radio" id="q2c" name="q2" value="C"><label for="q2c">組成宣教士關懷小組，用行動支持宣教士及他們的家庭、父母；關心述職的宣教士，協助交通、住宿、在財務上支持宣教士及宣教事工</label></div>
          <div class="option"><input type="radio" id="q2d" name="q2" value="D"><label for="q2d">負責接待外國講員、異鄉學子，或是預備餐點讓宣教士感到溫暖</label></div>
          <div class="option"><input type="radio" id="q2e" name="q2" value="E"><label for="q2e">企劃宣教年會、佈告欄、主日宣教短片，激發大家對宣教的負擔</label></div>
          <div class="option"><input type="radio" id="q2f" name="q2" value="F"><label for="q2f">實際報名跨文化宣教培訓，隨時預備自己前往福音禾場</label></div>
        </div>
      </div>
    </div>

    <!-- 第二部分 -->
    <div class="section">
      <h2 class="section-title">第二部分：生活現況評估</h2>
      <p style="margin-bottom:20px;color:var(--text-light);">請根據您的真實情況評分：5分=完全符合 | 3分=偶爾符合 | 1分=不太符合 | 0分=完全不符合</p>
      <div id="detailedQuestions"></div>
    </div>

    <button class="calculate-btn" id="submitBtn" onclick="calculateResults()">查看我的評估結果</button>

    <div class="results" id="results"></div>
  </div>
</div>

<div class="submit-toast" id="toast">✅ 結果已成功記錄，感謝您的參與！</div>

<script>
// ===== 設定 =====
// 部署 Google Apps Script 後，將 Web App URL 填入此處
const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_WEB_APP_URL';

// ===== 題目資料 =====
const detailedQuestions = [
  { id:1,  text:'我喜歡看國際新聞、地圖，或閱讀宣教士的傳記與歷史', category:'learn' },
  { id:2,  text:'當我看到世界各地的災難或需要時，我最直接的反應是為他們禱告', category:'pray' },
  { id:3,  text:'我會刻意在年節寄送卡片、包裹、email關心宣教士，發揮專業技能幫助宣教士，如協助稅務、醫療的協助等，讓宣教士無後顧之憂', category:'send' },
  { id:4,  text:'我對教會裡的新朋友、外籍移工或異鄉留學生感到親切，想主動關心他們', category:'welcome' },
  { id:5,  text:'我喜歡把感動我的宣教故事或呼召，分享給身邊的基督徒朋友', category:'mobilize' },
  { id:6,  text:'我會主動報名參加宣教課程（如 Kairos 把握時機、宣教六法訓練）', category:'learn' },
  { id:7,  text:'我的代禱手冊裡有固定的宣教士或福音未及族群（如穆斯林、佛門群體）', category:'pray' },
  { id:8,  text:'我認為用財務支持宣教，跟親自去宣教禾場一樣重要', category:'send' },
  { id:9,  text:'我願意開放我的家，或主動提供餐點與交通來服事有需要的人', category:'welcome' },
  { id:10, text:'我擅長籌辦活動、帶領小組，或有熱情去呼召大家一起投入某件事', category:'mobilize' },
  { id:11, text:'我正在認真考慮或預備，在未來 1 至 3 年內參與海外或跨文化短宣', category:'go' },
  { id:12, text:'只要上帝呼召我放下現在的生活去跨文化宣教，我願意順服', category:'go' }
];

// ===== 類型定義 =====
const categories = {
  learn: {
    name:'學習 (Learn)', icon:'📚', color:'#4472C4',
    img:'images/learn.png',
    desc:'您對跨文化有強烈好奇心，適合透過知識傳遞為宣教鋪路',
    action:'學習聖經中神對全地的心意、參加宣教課程如 Kairos、宣教心視野等課程、聽宣教士的分享',
    video:'https://youtu.be/yOx0UarezxA?si=MJSBMqH-plOs6IA3',
    learnMore:'https://omf.org/tw/0501/'
  },
  pray: {
    name:'禱告 (Pray)', icon:'🙏', color:'#70AD47',
    img:'images/pray.png',
    desc:'您有守望的恩賜，是宣教士在屬靈爭戰中最堅實的後盾',
    action:'認領 1 位宣教士固定代禱、加入教會宣教禱告會',
    video:'https://youtu.be/9NQxXbKNcUM?si=_H4qX4RL85qP5AAT',
    learnMore:'https://omf.org/tw/get-involved/pray-for-global-mission-2/'
  },
  send: {
    name:'差派 (Send)', icon:'🙌', color:'#FF8C42',
    img:'images/send.png',
    desc:'您是忠心的管家，透過心理、物資與金錢差派、託住第一線的事工',
    action:'設定每月固定差傳奉獻、指定支持特定宣教士或禾場、參加宣教士關懷小組',
    video:'https://youtu.be/kXxvHqOgLb8?si=JZgHCGvQYYq-t4Iv',
    learnMore:'https://omf.org/tw/0301/'
  },
  welcome: {
    name:'歡迎 (Welcome)', icon:'🤝', color:'#2E86AB',
    img:'images/welcome.png',
    desc:'您充滿愛心，能在本地向外籍人士與宣教士展現神的接待',
    action:'主動關心教會外籍人士、開放家庭接待宣教士、參與教會國際學生的接待事工',
    video:'https://youtu.be/LJM9rXqpgqE?si=xGhXipcYgxxxH0Dk',
    learnMore:'https://omf.org/tw/0701/'
  },
  mobilize: {
    name:'動員 (Mobilize)', icon:'📢', color:'#C55A11',
    img:'images/mobilize.png',
    desc:'您是宣教的火種，善於號召、聯絡，能影響更多人投入大使命',
    action:'在小組分享宣教見證、協助籌辦宣教活動',
    video:'https://youtu.be/pdtZ85QfFOs?si=VJnhbsxuGqx4KkCU',
    learnMore:'https://omf.org/tw/什麼是宣教動員/'
  },
  go: {
    name:'出去 (Go)', icon:'✈️', color:'#2E5C8A',
    img:'images/go.png',
    desc:'您有拓荒者的熱情，具備跨文化行動力，願意親自前往禾場',
    action:'參加教會或差會舉辦的短、中、長期宣教',
    video:'https://youtu.be/mGw4Dw0C_9k?si=JIYTwcv-KNZJ6z78',
    learnMore:'https://omf.org/tw/0601/'
  }
};

// ===== 渲染題目 =====
const container = document.getElementById('detailedQuestions');
detailedQuestions.forEach(q => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="question-text"><strong>題目 ${q.id}：</strong>${q.text}</div>
    <div class="score-buttons">
      ${[0,1,2,3,4,5].map(s=>`<button class="score-btn" onclick="setScore(${q.id},${s})" data-qid="${q.id}" data-score="${s}">${s}</button>`).join('')}
    </div>
    <input type="hidden" id="detail${q.id}" value="-1" data-category="${q.category}">
  `;
  container.appendChild(card);
});

const scores = {};
function setScore(qid, score) {
  scores[qid] = score;
  document.querySelectorAll(`[data-qid="${qid}"]`).forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.score) === score);
  });
  document.getElementById(`detail${qid}`).value = score;
}

// ===== 計算結果 =====
function calculateResults() {
  const q1 = document.querySelector('input[name="q1"]:checked');
  const q2 = document.querySelector('input[name="q2"]:checked');
  if (!q1 || !q2) { alert('請先完成第一部分的兩道快速評估題目'); return; }

  const quickCount = { A:0,B:0,C:0,D:0,E:0,F:0 };
  quickCount[q1.value]++;
  quickCount[q2.value]++;

  const detailScores = { learn:0,pray:0,send:0,welcome:0,mobilize:0,go:0 };
  detailedQuestions.forEach(q => {
    const val = parseInt(document.getElementById(`detail${q.id}`).value);
    detailScores[q.category] += (val >= 0 ? val : 0);
  });

  const letterToCategory = { A:'learn',B:'pray',C:'send',D:'welcome',E:'mobilize',F:'go' };
  let primaryLetter = 'A', maxCount = 0;
  for (let l in quickCount) { if (quickCount[l] > maxCount) { maxCount=quickCount[l]; primaryLetter=l; } }
  const primaryCategory = letterToCategory[primaryLetter];

  displayResults(detailScores, primaryCategory, q1.value, q2.value);
  submitToSheets(q1.value, q2.value, detailScores);
}

// ===== 顯示結果 =====
function displayResults(scoreMap, primaryType, q1val, q2val) {
  const maxScore = 10;
  const order = ['learn','pray','send','welcome','mobilize','go'];

  let cardsHtml = order.map(cat => {
    const info = categories[cat];
    const score = scoreMap[cat];
    const pct = (score / maxScore) * 100;
    const isHighlight = cat === primaryType;
    const suggestions = info.action.split('、').map(s=>`<li>${s.trim()}</li>`).join('');

    return `
      <div class="result-card${isHighlight?' highlight':''}">
        <img class="card-img" src="${info.img}" alt="${info.name}" loading="lazy">
        <div class="card-body">
          <div class="card-title">${info.icon} ${info.name}${isHighlight?' ⭐':''}</div>
          <div class="card-score" style="color:${info.color}">${score} / 10</div>
          <div class="card-bar"><div class="card-bar-fill" style="width:${pct}%;background:${info.color}"></div></div>
          <div class="card-desc">${info.desc}</div>
          <ul class="card-suggestions">${suggestions}</ul>
          <div class="card-actions">
            <a href="${info.video}" target="_blank" class="card-btn btn-video">🎬 觀看影片</a>
            <a href="${info.learnMore}" target="_blank" class="card-btn btn-more">📖 了解更多</a>
          </div>
        </div>
      </div>`;
  }).join('');

  const primaryInfo = categories[primaryType];
  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = `
    <div class="results-title">📊 您的評估結果</div>
    <div class="results-subtitle">⭐ 標示為您的主要宣教恩賜</div>
    <div class="primary-highlight">
      <div class="ph-label">🎯 您的主要宣教恩賜</div>
      <div class="ph-name" style="color:${primaryInfo.color}">${primaryInfo.icon} ${primaryInfo.name}</div>
      <div class="ph-desc">${primaryInfo.desc}</div>
    </div>
    <div class="results-grid">${cardsHtml}</div>
  `;
  resultsDiv.classList.add('show');
  setTimeout(() => resultsDiv.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}

// ===== 寫入 Google Sheets =====
function submitToSheets(q1val, q2val, detailScores) {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') return;

  const now = new Date().toLocaleString('zh-TW', { timeZone:'Asia/Taipei' });
  const detailValues = detailedQuestions.map(q => {
    const val = parseInt(document.getElementById(`detail${q.id}`).value);
    return val >= 0 ? String(val) : '未作答';
  });

  const payload = {
    timecode: now,
    q1: q1val,
    q2: q2val,
    details: detailValues
  };

  fetch(APPS_SCRIPT_URL, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  }).then(() => showToast()).catch(() => {});
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}
